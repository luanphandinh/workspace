# macOS default binds Command+W to Quit. Override so it does nothing (avoids
# accidental quit; use None — see alacritty(5) keyboard.bindings).
[keyboard]
bindings = [
  { key = "W", mods = "Command", action = "None" },
  # Cycle pinned tmux sessions. Two unique CSI sequences (F13 / F14
  # codes, which nothing on macOS emits naturally) are sent so tmux
  # matches them via user-keys without colliding with anything real.
  # Opt+Cmd+ArrowUp   → previous pinned session
  # Opt+Cmd+ArrowDown → next pinned session
  { key = "ArrowUp",   mods = "Option|Command", chars = "\u001b[25~" },
  { key = "ArrowDown", mods = "Option|Command", chars = "\u001b[26~" },
]

[font]
offset = { x = 0, y = 0 }
size = 12.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"
