# import = [
#     "~/.config/alacritty/gruvbox.toml"
# ]
[window]
decorations = "Buttonless"
padding = { x = 8 }

# macOS default binds Command+W to Quit. Override so it does nothing (avoids
# accidental quit; use None — see alacritty(5) keyboard.bindings).
[keyboard]
bindings = [
  { key = "W", mods = "Command", action = "None" },
  # Cycle pinned tmux sessions. Two unique CSI sequences (F13 / F14
  # codes, which nothing on macOS emits naturally) are sent so tmux
  # matches them via user-keys without colliding with anything real.
  # Opt+Cmd+ArrowUp or Ctrl+Shift+ArrowUp     → previous pinned session
  # Opt+Cmd+ArrowDown or Ctrl+Shift+ArrowDown → next pinned session
  { key = "ArrowUp",    mods = "Option|Command", chars = "\u001b[25~" },
  { key = "ArrowDown",  mods = "Option|Command", chars = "\u001b[26~" },
  { key = "ArrowUp",    mods = "Control|Shift", chars = "\u001b[25~" },
  { key = "ArrowDown",  mods = "Control|Shift", chars = "\u001b[26~" },
  { key = "K",          mods = "Control|Shift", chars = "\u001b[25~" },
  { key = "J",          mods = "Control|Shift", chars = "\u001b[26~" },
  # Previous / next tmux WINDOW in the current session (User2 / User3).
  # F15 / F16 codes — nothing on macOS emits these naturally.
  { key = "ArrowLeft",  mods = "Option|Command", chars = "\u001b[28~" },
  { key = "ArrowRight", mods = "Option|Command", chars = "\u001b[29~" },
  { key = "ArrowLeft",  mods = "Control|Shift", chars = "\u001b[28~" },
  { key = "ArrowRight", mods = "Control|Shift", chars = "\u001b[29~" },
  { key = "H",          mods = "Control|Shift", chars = "\u001b[28~" },
  { key = "L",          mods = "Control|Shift", chars = "\u001b[29~" },
  # Jump to tmux WINDOW 1..9 in the current session (User4..User12).
  # Overrides Alacritty's default Cmd+number tab switching.
  { key = "1", mods = "Command", chars = "\u001b[31~" },
  { key = "2", mods = "Command", chars = "\u001b[32~" },
  { key = "3", mods = "Command", chars = "\u001b[33~" },
  { key = "4", mods = "Command", chars = "\u001b[34~" },
  { key = "5", mods = "Command", chars = "\u001b[35~" },
  { key = "6", mods = "Command", chars = "\u001b[36~" },
  { key = "7", mods = "Command", chars = "\u001b[37~" },
  { key = "8", mods = "Command", chars = "\u001b[38~" },
  { key = "9", mods = "Command", chars = "\u001b[39~" },
]

[font]
offset = { x = 0, y = 0 }
size = 12.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"
