name: nvim-lsp-test

on: [push, pull_request]

jobs:
  test-gopls-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup
    - run: make setup

    - name: Install gopls
      run: |
        go install golang.org/x/tools/gopls@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Setup nvim
      run: make nvim

    - name: Verify gopls LSP is working
      run: |
        # Create a test Go file
        mkdir -p /tmp/testgo
        cat > /tmp/testgo/main.go << 'EOF'
        package main

        import "fmt"

        func main() {
            fmt.Println("hello")
        }
        EOF

        # Create go.mod
        cd /tmp/testgo && go mod init testgo

        # Test gopls is working with nvim
        nvim --headless -c "cd /tmp/testgo" -c "edit main.go" -c "sleep 3" -c "lua \
          local clients = vim.lsp.get_clients(); \
          if #clients == 0 then \
            print('ERROR: No LSP clients attached'); \
            vim.cmd('qa!'); \
            os.exit(1); \
          end; \
          for _, c in ipairs(clients) do \
            if c.name == 'gopls' then \
              print('SUCCESS: gopls is attached'); \
              vim.cmd('qa'); \
              os.exit(0); \
            end; \
          end; \
          print('ERROR: gopls not found among clients'); \
          vim.cmd('qa!'); \
          os.exit(1)" 2>&1

  test-gopls-macos:
    runs-on: macos-latest
