name: workspace

on:
  push:

jobs:
  workspace-macOS-locked:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup from lockfile
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make setup

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test

  workspace-macOS-latest:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup latest plugins
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make update

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test

  workspace-ubuntu-locked:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup from lockfile
      run: |
        which bash
        make setup

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test

  workspace-ubuntu-latest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup latest plugins
      run: |
        which bash
        make update

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test
