name: workspace

on: [push]

env:
  GO_VERSION: "1.25.x"

jobs:
  workspace-macOS:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: false

    - name: Install gopls
      run: |
        go install golang.org/x/tools/gopls@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Workspace
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make workspace

    - name: Neovim smoke tests
      run: make nvim-test

  workspace-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: false

    - name: Install gopls
      run: |
        go install golang.org/x/tools/gopls@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Workspace
      run: |
        which bash
        make workspace

    - name: Neovim smoke tests
      run: make nvim-test

  go-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1

    - name: Install golang
      run: make go

  go-macOs:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v1

    - name: Install golang
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make go
