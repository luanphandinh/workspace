name: workspace

on:
  push:
  pull_request:

jobs:
  workspace-macOS:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v1

    - name: Install Go
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make go

    - name: Workspace
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make workspace

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test

  workspace-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1

    - name: Install Go
      run: make go

    - name: Workspace
      run: |
        which bash
        make workspace

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test
