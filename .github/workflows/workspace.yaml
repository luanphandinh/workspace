name: workspace

on:
  push:

jobs:
  workspace-macOS:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_ENV_HINTS=1
        make setup

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test

  workspace-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1

    - name: Setup
      run: |
        which bash
        make setup

    - name: Agent CLI verification
      run: make verify-agent-clis

    - name: Neovim smoke tests
      run: make nvim-test
