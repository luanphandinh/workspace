name: workspace

on:
  push:

jobs:
  workspace:
    runs-on: ${{ matrix.os }}
    env:
      IS_CI_WORKSPACE: "1"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install workspace deps
        run: make setup-deps

      - name: Setup from lockfile
        run: make setup-runtime

      - name: Neovim smoke tests after lockfile setup
        run: make nvim-test

      - name: Update latest plugins
        run: make update

      - name: Neovim smoke tests after latest update
        run: make nvim-test
