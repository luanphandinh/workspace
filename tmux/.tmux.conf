# TPM - Tmux Plugin Manager - https://github.com/tmux-plugins/tpm
# TPM Configuration
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g mouse on
set -g history-limit 5000 # boost history
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ',*256col*:Tc'
set -ga terminal-overrides ',*256col*:Ss=\E[%p1%d q:Se=\E[ q'
set -g default-shell $SHELL
set -g default-command $SHELL
set -sg escape-time 0
set -g focus-events on
set -sg repeat-time 500
set-option -g renumber-windows on
set-option -g status-position top


# don't allow rename windows automatically
set-option -g allow-rename off


unbind-key y
# bind-key y run-shell "reattach-to-user-namespace -l zsh -c 'tmux show-buffer | pbcopy'"
# set-option -g default-command "reattach-to-user-namespace -l zsh"


# install reattach-to-user-namespace
# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard
unbind-key k
bind-key k delete-buffer \; clear-history \; send-keys "clear" \; send-keys "Enter" \; delete-buffer \; clear-history


# reload ~/.tmux.conf using PREFIX r
bind r source-file ~/.tmux.conf \; display "Reloaded!"
# Force a full client re-render. Use this when an Alacritty zoom-in/out
# or pane focus change leaves stale cells around pane borders.
bind C-l refresh-client \; display "Refreshed!"

bind | split-window -h -c '#{pane_current_path}'  # Split panes horizontal
bind _ split-window -h -c '#{pane_current_path}'  # Split panes horizontal
bind - split-window -v -c '#{pane_current_path}'  # Split panes vertically
bind c new-window -c '#{pane_current_path}'

# Use prefix to navigate through panes
# use bind -r if you want to repeat the option
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- pinned tmux sessions -------------------------------------------------
# - prefix+a        : pin / unpin the current session ("anchor")
# - prefix+A        : open / close the left sidebar listing pinned sessions
# - prefix+e        : erase / clear every pinned entry
# - User0 / User1   : prev / next pinned session. Alacritty maps
#                     Opt+Cmd+ArrowUp or Ctrl+Shift+ArrowUp
#                       → "\e[25~" (User0 = prev)
#                     Opt+Cmd+ArrowDown or Ctrl+Shift+ArrowDown
#                       → "\e[26~" (User1 = next)
#                     Ctrl+Shift+K/J       → same
# - User4..User12   : Cmd+1..9 jump to tmux window 1..9 in
#                     the current session.
#                     We use unique CSI sequences (NOT M-] / OSC) so the
#                     terminal parser delivers them whole as a single key.
set -g @pin_sidebar_width 20
set -s user-keys[0] "\e[25~"
set -s user-keys[1] "\e[26~"
set -s user-keys[2] "\e[28~"
set -s user-keys[3] "\e[29~"
set -s user-keys[4] "\e[31~"
set -s user-keys[5] "\e[32~"
set -s user-keys[6] "\e[33~"
set -s user-keys[7] "\e[34~"
set -s user-keys[8] "\e[35~"
set -s user-keys[9] "\e[36~"
set -s user-keys[10] "\e[37~"
set -s user-keys[11] "\e[38~"
set -s user-keys[12] "\e[39~"
bind a run-shell '~/bin/tmux-session-sidebar/toggle'
bind A run-shell '~/bin/tmux-session-sidebar/sidebar-toggle'
bind e run-shell '~/bin/tmux-session-sidebar/clear'
unbind-key -q P
unbind-key -q S
bind -n User0 run-shell '~/bin/tmux-session-sidebar/cycle prev'
bind -n User1 run-shell '~/bin/tmux-session-sidebar/cycle next'
# Opt+Cmd+Left / Right, Ctrl+Shift+Left / Right, or H/L
#   → previous / next WINDOW in the current session.
bind -n User2 previous-window
bind -n User3 next-window
# Cmd+1..9 → exact tmux WINDOW index in the current session.
bind -n User4 select-window -t :1
bind -n User5 select-window -t :2
bind -n User6 select-window -t :3
bind -n User7 select-window -t :4
bind -n User8 select-window -t :5
bind -n User9 select-window -t :6
bind -n User10 select-window -t :7
bind -n User11 select-window -t :8
bind -n User12 select-window -t :9

# When the sidebar is globally "on", any newly-created window or session
# should also get a sidebar so it never feels missing. The attach script
# is a no-op when the global flag is unset, so these hooks are safe to
# leave wired up at all times.
# Clear old broad hooks before setting the current narrow hook set.
set-hook -gu window-linked
set-hook -gu session-window-changed
set-hook  -g after-new-window    "run-shell -b '~/bin/tmux-session-sidebar/window-topology-changed'"
set-hook  -g window-unlinked     "run-shell -b '~/bin/tmux-session-sidebar/window-topology-changed'"
set-hook  -g session-created     "run-shell -b '~/bin/tmux-session-sidebar/window-topology-changed'"
# Renames + window selection both change what each sidebar should display.
# broadcast is cheap (just send-keys Enter) and only redraws in place.
set-hook  -g session-renamed     "run-shell '~/bin/tmux-session-sidebar/sync-pins >/dev/null 2>&1; ~/bin/tmux-session-sidebar/broadcast-redraw'"
set-hook  -g window-renamed      "run-shell '~/bin/tmux-session-sidebar/broadcast-redraw'"
# Window switching only needs the newly visible window's sidebar redrawn.
# Keep this targeted to one window so the active marker updates without
# repainting every sidebar in the server.
set-hook  -g after-select-window "run-shell -b '~/bin/tmux-session-sidebar/redraw-window #{window_id}'"
# Full repaint on pane focus changes. `refresh-client -S` only repaints the
# tmux status line, which is not enough when full-height sidebars and
# split panes leave stale cells.
set-hook  -g pane-focus-in       "refresh-client"
# When a pane is closed, freed space doesn't always re-flow cleanly when
# the sidebar's fixed-width anchor is present. Re-balance the affected
# window and re-pin the sidebar.
set-hook  -g after-kill-pane     "run-shell '~/bin/tmux-session-sidebar/on-pane-killed #{window_id}'"
# Client viewport resized (Alacritty zoom in/out, monitor plug/unplug,
# window drag). Fit all windows to the new viewport and recreate sidebars
# at the configured width.
# Debounced: only fires 2s after the LAST resize event, so a long drag
# / rapid zoom doesn't kick off N back-to-back kill+recreate passes.
set-hook  -g client-resized      "run-shell '~/bin/tmux-session-sidebar/sidebar-resize-debounced'"

bind -r Space next-layout

# unbind '"'
# unbind %

# Send save signal
bind -n C-s send-keys :w\n


setw -g mode-keys vi
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi V send -X select-line

# Exit copy mode only with q (defaults also exit via Escape, Enter, C-c, mouse, A, D, …)
bind-key -Tcopy-mode-vi Escape send -X clear-selection
bind-key -Tcopy-mode-vi C-c send -X clear-selection
bind-key -Tcopy-mode-vi Enter send -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi C-h select-pane -L
bind-key -Tcopy-mode-vi C-j select-pane -D
bind-key -Tcopy-mode-vi C-k select-pane -U
bind-key -Tcopy-mode-vi C-l select-pane -R
bind-key -Tcopy-mode-vi A send -X append-selection
bind-key -Tcopy-mode-vi D send -X copy-pipe-end-of-line "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi q send -X cancel
bind-key -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe "reattach-to-user-namespace pbcopy"

set-option -g set-titles on

# Bind ']' to use pbpaste
# bind ] run "reattach-to-user-namespace pbpaste | tmux load-buffer - && tmux paste-buffer"

# Collapsed all session windows by default
bind-key 'w' choose-tree -s

# TMUX STATUS BAR
set -g status-justify absolute-centre
set -g window-status-separator ' '
set -g window-status-format '#[fg=#a89984,bg=#3c3836] #I:#W '
set -g window-status-current-format '#[fg=#1d2021,bg=#d79921,bold] #I:#W '
set-option -g status-left-length 120
set -g status-interval 2
set -g status-left '#{s|#{HOME}| ~|:pane_current_path} | #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD) | '

set-option -g status-right-length 200
set -g status-right ' #(~/bin/tmux-claude-codex-status) '


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
# The pinned sidebar is a managed pane, not a normal shell. Make resurrect
# save/restore it as `sidebar` and rebuild pane markers after pane
# ids change during restore.
set -g @resurrect-processes '~sidebar'
set -g @resurrect-hook-post-save-layout '~/bin/tmux-session-sidebar/resurrect-save'
set -g @resurrect-hook-post-restore-all '~/bin/tmux-session-sidebar/resurrect-restore'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
